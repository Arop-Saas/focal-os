name: scalist_mobile
description: Scalist Staff Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0

  # Auth
  supabase_flutter: ^2.3.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Date/Time
  intl: ^0.19.0

  # Navigation
  go_router: ^14.0.0

  # URL launcher (for maps navigation)
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
